# kind cluster for the data-engineering lakehouse demo.
#
# 1 control-plane + 2 workers so the layout feels like a real cluster.
# Host ports are mapped onto fixed NodePorts on the control-plane node so the
# services are reachable at localhost:<port> without `kubectl port-forward`.
#
#   localhost:8888  -> Jupyter Lab          (NodePort 30888)
#   localhost:4040  -> Spark driver UI       (NodePort 30404)
#   localhost:8181  -> Iceberg REST catalog  (NodePort 30181)
#   localhost:8333  -> SeaweedFS S3 API      (NodePort 30333)
#   localhost:9333  -> SeaweedFS master UI    (NodePort 30933)
#
# The k8s version follows whatever node image ships with your kind release.
# To pin it, add e.g. `image: kindest/node:v1.36.1` under each node.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: data-eng
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30888
        hostPort: 8888
        protocol: TCP
      - containerPort: 30404
        hostPort: 4040
        protocol: TCP
      - containerPort: 30181
        hostPort: 8181
        protocol: TCP
      - containerPort: 30333
        hostPort: 8333
        protocol: TCP
      - containerPort: 30933
        hostPort: 9333
        protocol: TCP
  - role: worker
  - role: worker
