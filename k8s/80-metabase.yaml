# Metabase — BI dashboards on the Iceberg lakehouse.
#
# Connects to Trino (iceberg catalog) so analysts can build dashboards
# directly on the gold-layer tables. Single pod with embedded H2 metadata
# on a small PVC so saved questions/dashboards survive pod restarts.
#
# This manifest is opt-in (deployed by `make serving`) to keep the base lab lean.
#
# Metabase UI port 3000 mapped to host port 30300.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: metabase-data
  namespace: lakehouse
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metabase
  namespace: lakehouse
  labels:
    app: metabase
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: metabase
  template:
    metadata:
      labels:
        app: metabase
    spec:
      initContainers:
        - name: wait-for-trino
          image: busybox:1.38
          command:
            - sh
            - -c
            - |
              until nc -z trino 8080; do echo waiting for trino; sleep 2; done
      containers:
        - name: metabase
          image: metabase:local
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 3000 }
          env:
            # ── Java heap ───────────────────────────────────────────────────
            - { name: JAVA_OPTS, value: "-Xmx1G -XX:+UseG1GC" }
            # ── Metadata store (H2 on PVC) ──────────────────────────────────
            - { name: MB_DB_FILE, value: "/data/metabase.db/metabase.db" }
            # ── Disable anonymous tracking ──────────────────────────────────
            - { name: MB_ANON_TRACKING_ENABLED, value: "false" }
            # NOTE: the Trino data source is added interactively on first login
            # (Admin → Databases → Trino, host=trino port=8080 database=iceberg).
            # Metabase has no env-var to auto-provision a data source.
          readinessProbe:
            httpGet: { path: /api/health, port: 3000 }
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet: { path: /api/health, port: 3000 }
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests: { cpu: 100m, memory: 1Gi }
            limits: { memory: 2Gi }
          volumeMounts:
            - { name: data, mountPath: /data }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: metabase-data
---
apiVersion: v1
kind: Service
metadata:
  name: metabase
  namespace: lakehouse
  labels:
    app: metabase
spec:
  type: NodePort
  selector:
    app: metabase
  ports:
    - { name: http, port: 3000, targetPort: 3000, nodePort: 30300 }
