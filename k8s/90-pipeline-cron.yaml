# Optional daily pipeline refresh CronJob.
#
# Runs the full medallion stage sequence every day at 06:00 UTC so gold
# tables reflect current Postgres + bucket state. Re-running bronze→silver
# is essential — gold-only would recompute from *stale* silver, and
# sales_performance_24h would trend empty as purchases age past the 24h
# window.
#
# NOTES
# - This still does NOT re-run the loadgen, so no *new* source rows arrive
#   between CronJob runs. To keep source data fresh you would also schedule
#   the loadgen Job — out of scope for this lab.
# - S3 keys come from spark-defaults.conf in the image, but Iceberg's S3FileIO
#   (AWS SDK v2) still needs a region. A pod launched fresh from the image does
#   not inherit one, so we set AWS_* env here — mirroring 40-spark-iceberg.yaml
#   (the interactive Deployment) so `make pipeline` and this CronJob behave alike.
#
# Deploy: kubectl apply -f k8s/90-pipeline-cron.yaml
# Inspect: kubectl get cronjobs,pods -n lakehouse -l app=pipeline-refresh
# Remove: kubectl delete cronjob pipeline-refresh -n lakehouse
apiVersion: batch/v1
kind: CronJob
metadata:
  name: pipeline-refresh
  namespace: lakehouse
  labels:
    app: pipeline-refresh
spec:
  schedule: "0 6 * * *"  # daily at 06:00 UTC
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          initContainers:
            - name: wait-for-deps
              image: busybox:1.38
              command:
                - sh
                - -c
                - |
                  until nc -z iceberg-rest 8181; do echo waiting for iceberg-rest; sleep 2; done
                  until nc -z seaweedfs 8333; do echo waiting for seaweedfs; sleep 2; done
          containers:
            - name: spark-submit
              image: spark-iceberg:local
              imagePullPolicy: IfNotPresent
              env:
                # Iceberg S3FileIO (AWS SDK v2) needs a region even against
                # SeaweedFS; keys mirror 40-spark-iceberg.yaml for parity.
                - { name: AWS_ACCESS_KEY_ID, value: admin }
                - { name: AWS_SECRET_ACCESS_KEY, value: password }
                - { name: AWS_REGION, value: us-east-1 }
              command:
                - sh
                - -c
                - |
                  set -e
                  for s in 10_postgres_to_bronze 20_s3_to_bronze \
                            30_bronze_to_silver 40_silver_to_gold 50_gold_analytics; do
                    spark-submit /opt/pipeline/$s.py
                  done
          # Not a standing service — just a cron-triggered batch task
          nodeSelector:
            kubernetes.io/os: linux
