# Apache Iceberg REST catalog — production-grade server with JdbcCatalog
# backed by Postgres for persistent table metadata.
#
# Data/metadata files still live in SeaweedFS (s3://warehouse/); only the
# catalog registry (namespace + table entries) is in Postgres.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iceberg-rest
  namespace: lakehouse
  labels:
    app: iceberg-rest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iceberg-rest
  template:
    metadata:
      labels:
        app: iceberg-rest
    spec:
      initContainers:
        - name: wait-for-seaweedfs
          image: busybox:1.38
          command: ["sh", "-c", "until nc -z seaweedfs 8333; do echo waiting for seaweedfs; sleep 2; done"]
        - name: wait-for-postgres
          image: busybox:1.38
          command: ["sh", "-c", "until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done"]
      containers:
        - name: iceberg-rest
          image: iceberg-rest:local
          ports:
            - { name: rest, containerPort: 8181 }
          env:
            # --- S3 / SeaweedFS (data files) ---
            - { name: AWS_ACCESS_KEY_ID, value: admin }
            - { name: AWS_SECRET_ACCESS_KEY, value: password }
            - { name: AWS_REGION, value: us-east-1 }
            - { name: CATALOG_WAREHOUSE, value: "s3://warehouse/" }
            - { name: CATALOG_IO__IMPL, value: org.apache.iceberg.aws.s3.S3FileIO }
            - { name: CATALOG_S3_ENDPOINT, value: "http://seaweedfs:8333" }
            - { name: CATALOG_S3_PATH__STYLE__ACCESS, value: "true" }
            # --- JdbcCatalog backend (table metadata in Postgres) ---
            - { name: CATALOG_CATALOG__IMPL, value: org.apache.iceberg.jdbc.JdbcCatalog }
            - { name: CATALOG_URI, value: "jdbc:postgresql://postgres:5432/iceberg_catalog" }
            - { name: CATALOG_JDBC_USER, value: postgresuser }
            - { name: CATALOG_JDBC_PASSWORD, value: postgrespw }
          readinessProbe:
            httpGet: { path: /v1/config, port: 8181 }
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket: { port: 8181 }
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests: { cpu: 100m, memory: 384Mi }
            limits: { memory: 1Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: iceberg-rest
  namespace: lakehouse
  labels:
    app: iceberg-rest
spec:
  type: NodePort
  selector:
    app: iceberg-rest
  ports:
    - { name: rest, port: 8181, targetPort: 8181, nodePort: 30181 }
