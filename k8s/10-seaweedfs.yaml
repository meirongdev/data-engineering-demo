# SeaweedFS — S3-compatible object storage (Apache 2.0).
# Single-pod all-in-one server with the S3 gateway enabled on :8333.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: seaweedfs-s3-config
  namespace: lakehouse
data:
  # One static identity (admin/password) with full access. The Iceberg REST
  # catalog and Spark both authenticate with these credentials.
  s3.json: |
    {
      "identities": [
        {
          "name": "admin",
          "credentials": [
            { "accessKey": "admin", "secretKey": "password" }
          ],
          "actions": ["Admin", "Read", "Write", "List", "Tagging"]
        }
      ]
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seaweedfs-data
  namespace: lakehouse
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
  # kind ships a default "standard" StorageClass (local-path provisioner).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seaweedfs
  namespace: lakehouse
  labels:
    app: seaweedfs
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: seaweedfs
  template:
    metadata:
      labels:
        app: seaweedfs
    spec:
      containers:
        - name: seaweedfs
          image: chrislusf/seaweedfs:4.37
          args:
            - server
            - -dir=/data
            - -master.volumeSizeLimitMB=1024
            - -s3
            - -s3.port=8333
            - -s3.config=/etc/seaweedfs/s3.json
          ports:
            - { name: s3, containerPort: 8333 }
            - { name: master, containerPort: 9333 }
            - { name: volume, containerPort: 8080 }
            - { name: filer, containerPort: 8888 }
          volumeMounts:
            - { name: data, mountPath: /data }
            - { name: s3-config, mountPath: /etc/seaweedfs }
          readinessProbe:
            tcpSocket: { port: 8333 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket: { port: 9333 }
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { memory: 1Gi }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: seaweedfs-data
        - name: s3-config
          configMap:
            name: seaweedfs-s3-config
---
apiVersion: v1
kind: Service
metadata:
  name: seaweedfs
  namespace: lakehouse
  labels:
    app: seaweedfs
spec:
  type: NodePort
  selector:
    app: seaweedfs
  ports:
    - { name: s3, port: 8333, targetPort: 8333, nodePort: 30333 }
    - { name: master, port: 9333, targetPort: 9333, nodePort: 30933 }
