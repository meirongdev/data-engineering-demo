# One-shot Job: create the SeaweedFS buckets the demo needs.
#   * warehouse — Iceberg table data + metadata (S3FileIO never creates buckets).
#   * pageviews — raw clickstream JSON dropped by the loadgen (bronze source).
# Idempotent — safe to re-run.
apiVersion: batch/v1
kind: Job
metadata:
  name: bucket-init
  namespace: lakehouse
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: bucket-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Waiting for SeaweedFS S3 ..."
              until mc alias set sw http://seaweedfs:8333 admin password >/dev/null 2>&1; do
                echo '...waiting...'; sleep 2;
              done
              echo "Creating buckets: warehouse, pageviews, customer-segments"
              mc mb --ignore-existing sw/warehouse
              mc mb --ignore-existing sw/pageviews
              mc mb --ignore-existing sw/customer-segments
              mc ls sw
              echo "Done."
