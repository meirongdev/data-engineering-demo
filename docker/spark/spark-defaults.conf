# Spark defaults for the lakehouse demo.
#
# `pyspark` launches the JVM via spark-submit, which reads this file, so any
# SparkSession.builder.getOrCreate() in a notebook picks up the catalog below.
#
# Catalog name: `demo` (also the default catalog).

spark.sql.extensions                          org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

spark.sql.catalog.demo                        org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.demo.type                   rest
spark.sql.catalog.demo.uri                    http://iceberg-rest:8181
spark.sql.catalog.demo.warehouse              s3://warehouse/
spark.sql.catalog.demo.io-impl                org.apache.iceberg.aws.s3.S3FileIO

# SeaweedFS S3 endpoint. Path-style access is required (no bucket subdomains).
spark.sql.catalog.demo.s3.endpoint            http://seaweedfs:8333
spark.sql.catalog.demo.s3.path-style-access   true
spark.sql.catalog.demo.s3.access-key-id       admin
spark.sql.catalog.demo.s3.secret-access-key   password

# s3a:// filesystem (hadoop-aws) — used to read raw pageview JSON from the
# `pageviews` bucket. Separate from Iceberg's S3FileIO above; same SeaweedFS.
spark.hadoop.fs.s3a.endpoint                  http://seaweedfs:8333
spark.hadoop.fs.s3a.access.key                admin
spark.hadoop.fs.s3a.secret.key                password
spark.hadoop.fs.s3a.path.style.access         true
spark.hadoop.fs.s3a.connection.ssl.enabled    false
spark.hadoop.fs.s3a.impl                      org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.aws.credentials.provider  org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider

spark.sql.defaultCatalog                      demo
spark.sql.catalogImplementation               in-memory

# Keep the local-mode driver small enough to fit on a kind worker.
spark.driver.memory                           1g
spark.sql.shuffle.partitions                  4

spark.eventLog.enabled                        true
spark.eventLog.dir                            /home/iceberg/spark-events
spark.history.fs.logDirectory                 /home/iceberg/spark-events
